  <div class="nav-identity">

    <span class="site-subtitle">Software Developer | Java | Typescript | Angular | Cloud | AI Driven Developer</span>
  </div>
  <div class="nav-links">
    <span class="nav-stack">Website built with Java, Spring Boot, Angular, TypeScript, Docker, CI/CD with GitHub Actions and deployed on Render</span>
    <a class="brand" routerLink="/">Blog</a>
    <button class="btn-link dark-toggle" (click)="toggleDark()" [title]="dark ? 'Light mode' : 'Dark mode'">

    </button>
    <ng-container *ngIf="auth.user$ | async as user; else loggedOut">
      <div class="nav-user">
        <span class="nav-username">{{ user.username }}</span>
        <a *ngIf="user.role === 'ROLE_ADMIN'" routerLink="/admin" class="nav-pill">Admin</a>
        <button class="nav-pill nav-pill-outline" (click)="logout()">Logout</button>
      </div>
    </ng-container>
    <ng-template #loggedOut>
      <a routerLink="/login" class="nav-pill">Login</a>
    </ng-template>
  </div>
</nav>
